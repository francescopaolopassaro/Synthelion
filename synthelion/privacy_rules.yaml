countries:
  - code: "EU"
    language: "multi"
    rules:
      - category: "Email"
        pattern: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
        base_weight: 8
        context_keywords: ["email", "mail", "contatto", "indirizzo", "posta", "adresse", "correo"]
        compliance_tags: ["GDPR Art.4(1)"]
      - category: "Phone E.164"
        pattern: '\b\+?[1-9]\d{6,14}\b'
        base_weight: 10
        context_keywords: ["tel", "phone", "cell", "mobile", "fisso", "nummer", "téléphone", "teléfono", "telefon"]
        compliance_tags: ["GDPR Art.4(1)"]
      - category: "IBAN"
        pattern: '\b[A-Z]{2}\d{2}[A-Z0-9]{4,30}\b'
        base_weight: 22
        validator_name: "IBAN"
        context_keywords: ["iban", "conto", "bank", "compte", "cuenta", "konto", "rachunek"]
        compliance_tags: ["PCI-DSS", "SEPA"]
      - category: "Credit Card"
        pattern: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'
        base_weight: 25
        validator_name: "LUHN"
        context_keywords: ["card", "credit", "debit", "tarjeta", "carte", "karta", "pago"]
        compliance_tags: ["PCI-DSS"]
      - category: "JWT/Token"
        pattern: '\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
        base_weight: 28
        is_high_confidence: true
        context_keywords: ["token", "jwt", "auth", "bearer"]
        compliance_tags: ["NIST 800-53"]
      - category: "Password/Secret"
        pattern: '\b(?:password|passwd|pwd|secret|token|api_key|apikey|bearer)[\s:=]+\S{8,}\b'
        base_weight: 24
        compliance_tags: ["NIST 800-53"]
      - category: "GPS Coordinates"
        pattern: '\b[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)\b'
        base_weight: 10
        context_keywords: ["gps", "location", "posizione", "ubicación", "ortung", "coordonnées", "współrzędne", "locatie", "localização", "lat", "lon", "plus code", "what3words", "geolokacja", "standort"]
        compliance_tags: ["GDPR Art.4(1) - Location Data"]
      - category: "EU Vehicle License Plate"
        pattern: '(?i)(?:targa|kennzeichen|license plate|placa|rejestracja|kenteken|immatriculation)\s*[:=]?\s*[A-Z0-9]{1,4}[-\s.]*[A-Z0-9]{1,4}[-\s.]*[A-Z0-9]{1,4}\b'
        base_weight: 12
        context_keywords: ["auto", "veicolo", "car", "vehicle", "kfz", "wozidlo", "samochód"]
        compliance_tags: ["GDPR Art.4(1) - Indirect Identifiers"]
      - category: "PNR / Booking Code"
        pattern: '(?i)(?:pnr|booking code|prenotazione|codice prenotazione|reservation code|codice viaggio|buchungscode|code de réservation|código de reserva|nr rezerwacji|boekingscode)\s*[:=]?\s*[A-Z0-9]{6}\b'
        base_weight: 8
        context_keywords: ["volo", "treno", "hotel", "aereo", "flight", "train", "flug", "vlucht", "pociąg", "tren", "amadeus", "sabre", "galileo", "viaje", "reise"]
        compliance_tags: ["GDPR Art.4(1) - Mobility Data"]
      - category: "Social / Messenger Handle"
        pattern: '(?i)(?:@|t\.me\/|instagram\.com\/|x\.com\/|tiktok\.com\/|discord\.gg\/|telegram\.me\/|linkedin\.com\/in\/)[a-zA-Z0-9_\.]{3,32}\b'
        base_weight: 6
        context_keywords: ["contattami", "scrivimi", "contact me", "kontakt", "contactez-moi", "contáctame", "skontaktuj się", "neem contact op", "profile", "profil", "perfil", "canale", "channel", "grupo", "group"]
        compliance_tags: ["GDPR Art.4(1) - Digital Identity"]
      - category: "Minor Data (<16)"
        pattern: '(?i)\b(?:minore di|bambino di|ragazzo di|under\s*|minderj[aä]hrig unter|mineur de|menor de|małoletni poniżej)\s*\d{1,2}\s*(?:anni|years|ans|años|lat|jahr|let)\b'
        base_weight: 18
        context_keywords: ["scuola", "asilo", "genitore", "tutore", "autorizzazione", "consenso genitori", "pediatra", "école", "crèche", "parent", "guardian", "einverständnis", "consentimiento", "zgoda rodziców", "toestemming ouder"]
        compliance_tags: ["GDPR Art.8 - Enhanced Minor Protection"]
      - category: "Legal Case / File Number"
        pattern: '(?i)(?:rg|r\.g\.|proc\.|fasc\.|causa|sentenza|decreto|verbale|denuncia|aktenzeichen|dossier judiciaire|expediente|nr sprawy|zaaknummer)\s*(?:n\.?)?\s*\d{3,6}[\/-]\d{2,4}\b'
        base_weight: 15
        context_keywords: ["avvocato", "tribunale", "causa", "processo", "polizia", "carabinieri", "questura", "procura", "avocat", "tribunal", "police", "gendarmerie", "abogado", "juzgado", "adwokat", "sąd", "advocaat", "rechtbank"]
        compliance_tags: ["GDPR Art.10 - Judicial Data", "ePrivacy Directive"]
      - category: "Employee / Badge ID"
        pattern: '(?i)(?:matricola|badge|dipendente|studente|employee id|personalnummer|numéro d''employé|número de empleado|nr pracownika|werknemersnummer|código de funcionário|kennung|identyfikator)\s*[:=]?\s*[A-Z0-9\-]{4,12}\b'
        base_weight: 9
        context_keywords: ["azienda", "ufficio", "badge", "timbratura", "turno", "hr", "personale", "tesserino", "entreprise", "bureau", "ressources humaines", "empresa", "oficina", "rrhh", "firma", "biuro", "karty", "zmiana", "werkgever", "kantoor"]
        compliance_tags: ["GDPR Art.4(1) - Employment Data", "EU Directive 2019/1152"]

  - code: "IT"
    language: "it"
    rules:
      - category: "Italian Tax Code (CF)"
        pattern: '\b[A-Z]{6}[0-9LMNPQRSTUV]{2}[ABCDEHLMPRST][0-9LMNPQRSTUV]{2}[A-Z][0-9LMNPQRSTUV]{3}[A-Z]\b'
        base_weight: 18
        validator_name: "CF_IT"
        is_high_confidence: true
        context_keywords: ["cf", "codice fiscale", "tessera", "sostituto imposta"]
        compliance_tags: ["GDPR", "Italian D.Lgs 196/2003"]
      - category: "Italian VAT Number"
        pattern: '\bIT?\d{11}\b'
        base_weight: 16
        validator_name: "PIVA_IT"
        context_keywords: ["piva", "partita", "iva", "vat"]
        compliance_tags: ["GDPR", "Italian Revenue Agency"]

  - code: "DE"
    language: "de"
    rules:
      - category: "German Tax ID (Steuer-Id)"
        pattern: '\b\d{11}\b'
        base_weight: 19
        validator_name: "STEUER_ID_DE"
        is_high_confidence: true
        context_keywords: ["steuer-id", "steueridentifikationsnummer", "steuernummer"]
        compliance_tags: ["DSGVO", "BfDI"]
      - category: "German ID Card"
        # Real Personalausweis shape: 1 letter (from a restricted set, excludes vowels/
        # ambiguous letters) + 8 digits (the last one is the check digit). Deliberately
        # different from other 9-character IDs (e.g. Spanish NIF = 8 digits + letter,
        # UK NINO = 2 letters + 6 digits + letter) to avoid cross-country false positives.
        pattern: '(?-i)\b[CFGHJKLMNPRTVWXYZ]\d{8}\b'
        base_weight: 14
        validator_name: "IDCARD_DE"
        context_keywords: ["ausweis", "personalausweis", "reisepass", "id-karte"]
        compliance_tags: ["DSGVO"]

  - code: "FR"
    language: "fr"
    rules:
      - category: "French Social Security (NIR)"
        pattern: '\b[12]\s?\d{2}\s?[0-9]{2}\s?[0-9]{2}\s?[0-9]{3}\s?[0-9]{3}\s?[0-9]{2}\b'
        base_weight: 19
        validator_name: "NIR_FR"
        is_high_confidence: true
        context_keywords: ["nir", "ssn", "sécu", "sécurité sociale", "numéro sécurité"]
        compliance_tags: ["RGPD", "CNIL"]
      - category: "French Business ID (SIREN/SIRET)"
        pattern: '\b\d{3}\s?\d{3}\s?\d{3}\b|\b\d{3}\s?\d{3}\s?\d{3}\s?00\d{2}\b'
        base_weight: 13
        context_keywords: ["siren", "siret", "entreprise", "société"]
        compliance_tags: ["RGPD", "INSEE"]

